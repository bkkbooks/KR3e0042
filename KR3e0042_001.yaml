body:
  text: 集驗背疽方宋李迅著背疽之方所傳百餘然有驗者極少其間又有用藥偏重或太冷或太熱或藥性有毒者今皆不録獨擇嘗用而經驗者録之庶幾不至有悮活人治病之意背疽其源有五天行一瘦弱氣滯二怒氣三腎氣虛四飲法酒食炙煿物服丹藥熱毒五蓋治背疽不可一槩將為熱毒其治之法難易當自一而五察疽發有內外之别初發疽時一粒如麻豆大身體便發熱生疽處肉亦熱腫大而髙多生疼痛破後肉色紅紫此為外發雖大若盆碗如用藥有理百人百可活如初發疽時不拘小大身體無熱自覺倦怠生疽處亦不熱數日之間漸漸開大不腫不髙不疼不痛低陷而壞爛破後肉紫黑色此為內發有此證者未發見之先藏府已先潰爛百人百不救雖有神仙藥亦付之無可奈何審內證用藥自㵼嘔吐不飲食診脈而腎脈最虛此等古人皆以為不治之證然尚有救療之理服補藥捷徑腎脈虛甚當用補藥而有抵牾處如用鹿茸附子之藥是抱薪救火如用平補之藥則腎氣又猝難平復若俟河之清向來有一貴人苦疽疾正生此一症諸醫無策愚云昔嘗聞一名醫講論凡人遇五更初腎氣必開若一語言咳嗽即腎氣復合遇腎開時進一服平補藥其功效勝尋常服峻補之藥十數服愚以此策獻之遂選用山藥丸所用皆平補腎氣全無僣燥偏重之藥依此法而進詳以告病者與其侍傍之子弟如法而服藥三日之後醫者診脈知其腎脈已平復矣則有疽疾人腎脈虛弱未可便如古人之論以為不可治若人有痼冷虛弱危困之疾如其法而用藥所謂用力寡而收功倍矣案山藥丸缺疽發所在有不可治者腦上諸陽所會穴近腦則髓出頸項上近咽喉藥餌飲食之所通一有所礙兩不能進腎俞上與腎相抵命之所繫穴即透空又不可著艾三處有疽並為難治戒忌作勞呌怒嗜欲飲食如乾濕麵炙煿淹藏法酒生冷滯膩魚羊並不可食性熱者發熱冷者損脾腎毒者發病皆當戒之病者之房深戒有腋氣人并有孕婦人月經行婦人入房合藥亦忌此等人見又忌雞犬貓兒見之已上戒忌已安後半載間血氣未定猶當謹戒不廢藥餌方能保全疽瘡之方有驗者載於方書然有貧乏無錢買藥又有適居僻邑草市難得藥材只得服鷺鷥藤酒繼以麥飯石膏塗傅神異膏貼之亦屢用取效若無麥飯石膏如田夫野人只用神異膏亦可麥飯石膏案此方原缺今從蘇沈良方補入白麥飯石色黃白類麥飯者尤佳炭火燒赤醋中浸之十遍研白蘞末與石等分鹿角不用自脫者須元帶腦骨者截用二三寸炭火燒至煙盡為度杵為末依前二味右並搗為末取多年米醋於銚中煎令魚眼沸即下前件藥末調如稀餳以箆子塗傅腫上只當瘡頭留一指地勿令合以出熱氣如未膿當內消若已作頭當撮小若日久瘡甚肌肉損爛筋骨出露即布上塗藥貼之乾即再換但以鬲中穴無不瘥其瘡切忌手觸宜慎之麥飯石膏論麥飯石膏治背疽之疾神妙莫比惜乎世人罕有能知者然古方所載用藥制度略而不詳則其間藥材不真修製茍簡自是致其無驗非方之誤也愚親見一貴人有此疾醫者用麥飯石膏塗貼不惟無效又且添痛楚更以毒藥盒之膿亦不潰晝夜疼痛不得安寢瘡逐日開大寖至兩脅又於咽喉腳膝間遍發數疽醫者盡以為不可治療愚雖預備此藥選擇修製既良且精而未敢便用俟諸藥縮手試以用之一夕之間疼痛盡止膿血俱潰來如湍水病者安寢衆皆驚愕以謂别有神藥不察止於麥飯石膏也疽疾須得膿血潰散之多即使毒氣隨膿血出不至內傷藏府病者得安有一庸醫見膿不潰遂打兩錫管欲插入疽以口吸出其膿愚謂用此則病者必不可救力沮其説又用薦席開其一竇使病者仰卧以取膿此説不可諌因令試之膿亦不來後卒用愚所合麥飯石膏而取效自此而後鄉閭有此疾者來下問因録此方俾擇修合盡取十全之功愚故詳著之一癰初作之時便合用麥飯石膏四圍塗傅以護其根腳不可使開中心却要留癰口如錢大使毒氣出如癰漸小隨其大小傅之直候疽破膿潰之後口收止猶徑寸許却用神異膏貼傅收住却用麥飯石膏神異膏治一切瘡疥按此方原缺今從危亦林得效方補入全蝎七個去毒皂角一錠挫碎巴豆七粒去殼蛇床子三錢清油一兩黃蠟半兩輕粉半字雄黃别研三錢右先用皂角全蝎巴豆煎油變色去了三味入黃蠟化開取出冷處入雄黃蛇床末輕粉和勻成膏先用苦參湯溫洗後以藥擦瘡疥上神效又神異膏按此方原缺今從赤水玄珠補入黃耆杏仁元參各一兩右用麻油二斤煎至將黑加蛇蛻五錢蜂房一兩男子髮一團如雞子大再煎至黑去滓徐徐下黃丹不拘多少得中為度文火熬收一癰疽既破膿血潰多五日或七日後用神異膏貼傅若根腳小五日後貼如濶大須七日十日後方可貼癰疽用藥大綱此書所著方頗為周備但欲使用藥者不可不知之爾然人能逐一玩味詳説深思用藥之意臨時看其病證次第用藥無有不效近時有親舊得此病為愚醫所惑或用君臣藥或用草藥其疾益甚痛苦日增然後回心杜絶衆醫用愚方間蒙下問但指示三五方與之服餌無有不安者今略書用藥要領與夫先後之序畫一於後一初覺得背疽之疾便合服內托散後來不生變證口舌無瘡此藥但可服十數服而止內托散大止疼痛如未破即點破有膿按此方原缺今從和劑局方補入川烏一兩炮茯苓三分苦杖半兩獨活白芷甘草各一兩右為末每服二錢酒調下日三服一即合繼服五香連翹湯服此藥如大便寬快內熱既省即合住服若一二日之後大便再閉須合再服要取利毒氣至盡然後住服亦合看病人虛實諒其輕重而進藥五香連翹湯木香二分不見火沉香三分不見火連翹全者去蒂三分射干三分升麻三分黃耆三分㨂無又附者生用木通三分去節甘草半兩生用丁香半兩㨂去枝杖不見火乳香半兩别碾大黃微炒半兩銼麝真者一錢半别碾桑寄生三分難得真者缺之亦可獨活三分買老羌活用今鋪家所賣獨活乃是土當歸不堪用右為粗末和勻每服三大錢水一盞煎至七分去滓服留滓二服用水二盞再煎作一服積四散滓用水三盞又再煎作一服然後不用其滓一方用銀器煎藥如無銀器入銀一片同煎內桑寄生一味最能療病但難得真者如闕用升麻代今已加升麻若無真桑寄生則升麻分量當倍用一次合洪氏排膿內補散無嘔逆之證用好酒下有嘔逆之證合用木香湯下此一藥合與癰疽相為終始服餌不可輟化毒排膿內補十宣散亦名托裹十宣散治一切癰疽癤瘡未成者速敗已成者速潰敗膿自出無用手擠惡肉自去不犯刃仗服藥後疼痛減其效如神按此方原缺今從和劑局方補入黃耆以綿上來者為勝狀如箭簳長二三尺頭不義者洗淨寸截捶破撕擘以鹽湯潤透用盞盛湯瓶上一炊久焙燥隨衆藥入碾即成細末人參以新羅者為上擇團結重實滋潤洗淨去蘆薄切乾搏用當歸取川中來者擇大片如馬尾狀滋潤甜辣芬香者溫水洗薄切焙乾各用二兩厚朴用梓州者肉厚而色紫搯之油出去粗皮切薑汁窨一宿爛熟焙燥不用杜朴桔梗以有心味苦者為真無心味乾者薺苨也主解藥毒切勿誤用洗淨去頭尾薄切焙燥桂心用卷薄者古法帶皮桂每兩止取二錢半合用一兩當買四兩候衆藥罷别研不得見火芎藭以川中來者為上今多撫芎大塊者洗淨切焙防風擇新香者淨洗切焙甘草生用白芷各一兩右十味選藥貴精皆取淨曬焙極燥方稱除桂心外一處搗羅為細末入桂令勻每服自三錢加至五錢熱酒調下日夜各數服加至五錢服至瘡口合更服尤佳所以補前損杜後患也不飲酒人濃煎木香湯下然不若酒力之勝也或飲酒不多能勉強間用酒調并以木香湯同酒功效當不止於酒也大抵癰疽之作皆血氣凝滯風毒壅結所致治之不早則外壞肌肉攻藏府其害甚大才覺便服倍加服數服之醉則其效尤速發散風毒流行經絡排膿止痛生肌長肉藥性平和老人小兒婦人室女皆可服之一嘔逆有二證一證謂其初發時不曽服內托散伏熱在心一證有氣虛脾氣不正而嘔合子細看病證參酌用藥若是因熱而嘔外證心煩身熱癰作痛此即是伏熱在心合將內托散伏三兩服而止不可多服若是氣虛而嘔其證心不煩熱遇早便嘔或聞穢氣亦嘔早晨合服嘉禾散如有寒熱合服家傳正氣散五更初當服山藥丸以補其腎一發背人雖云有熱未有不從腎虛而得之者若疽疾減退五分之後便合如前法五更初時必須服山藥丸一劑論服嘉禾散按嘉禾𣪚此方原缺如病人氣弱不進飲食合服嘉禾散於內加白豆蔲仁分兩昨有一貴人苦疽疾醫者用藥失序久而不痊因致虛弱全不飲食愚欲進嘉禾散而諸醫爭言內有丁香發熱不可用殊不知治疽之藥丁香預其一况有因怒氣而發疽今嘉禾散中所用之藥盡是平和益脾胃降氣之藥辨論不勝遲遲數日服他藥無效卒乃用之而病人方能進食自此以後遇早晨住服參苓必進嘉禾散一服疾安而後已家傳不換金正氣散治背疽先感風寒脾氣不正寒熱嘔吐蒼术捒黃色不爛者先用米泔汁浸夏秋半日春冬一日淨洗再用新汲水浸一宿削去黑皮銼焙與麥麩同炒至色黃香熟去麵用四兩淨厚朴揀紫色者削去粗皮及中間一重黑心如紙厚要銼三寸長劈作薄片每厚朴五兩淨用生薑五兩淨連皮薄切搗爛同淹一宿以文武火翻覆炙五六次炙至薑滓焦黑刮去薑不用只用厚朴細銼取四兩淨再用薑四兩連皮薄切搗爛同厚朴和一處再淹一宿入銚內用文武火炒至乾用甘草炙銼去赤皮細削取二兩淨陳橘皮買真橘皮以水浸三時久洗去黑塵掠去肉白筋與瓤銼焙取三兩淨右四味同為一處再入火內文武火微炒一次却用紙盛於木板上出火毒半夏湯泡七次削去黑臍細銼焙乾碾為細末以生薑自然汁和作薄餅子安文武火上炙至黃熟為度取二兩淨藿香去枝杖取葉用以水淨洗去沙塵有日曬乾無日以微火焙二兩淨人參一兩去頂細銼焙木香一兩濕紙裹煨至紙乾為度去紙細銼白茯苓一兩去黑皮封右將前四味已炒藥續入後五味半夏藿香等不炒同一處碾羅為細末二錢水一盞生薑錢三片棗一枚同煎至八分臨熱入鹽少許溫服無時論服不換金正氣散近時有數人病背疽服前方藥餌未安之間遍身寒熱或先寒後熱或先熱後寒連日作或間日作必先嘔痰然後寒熱寒熱後大汗然後止時醫多欲用柴胡牡礪止汗之藥又有以為瘧疾欲下恆山飲子愚力辨云背疽之後不可專以為有熱亦有氣虛而得之亦有因怒氣并血氣凝滯而得之其所以發寒熱者先感寒邪脾氣不正痰盛而有此證若下柴胡必㵼肝母既虛而又㵼其子牡礪澀氣氣血已不榮運又服澀氣恆山飲子發吐痰大損脾胃用藥如此可為誤謬愚但令服家傳不換金正氣散祛寒邪正脾氣痰飲自消寒熱不作兼服排膿內補散以木香湯易酒不欲引嘔吐故也服此藥三日寒熱自退嘔吐不作寒熱自止一癰疽才破有口便合用豬蹄湯洗其初連日洗五日後間日洗欲安之際三日一洗豬蹄湯治癰疽腫壞消毒氣去惡肉凡有瘡口便用此藥淋洗香白芷不見火甘草生用獨活用老羌活黃芩去心赤芍藥去皮當歸去蘆洗去沙露蜂房取有蜂兒者用以上各等分為粗末右先將豬蹄前蹄兩隻一斤只用白水三升煮軟將汁水兩次澄清去上面油花下面滓肉每次用藥粗末一兩投於汁中再用文武火煎十數沸濾去滓以故帛醮藥湯溫溫徐徐薄揩瘡上死肉惡血隨洗而下淨洗訖以故帛拭乾仍避風忌人口氣吹之有狐臭人并月經見行婦人貓犬並不令入病人房洗瘡切弗以手搐著洗疽之方所傳三四十用之止此一方極神效內所用露蜂房最有理謂其以毒攻毒也一治背疽初作根腳濶大如枕未有尖頭尋灸穴法凡覺背上腫咽疼痛用濕紙貼腫上看先乾處是頭碾大蒜十頭入淡䜴半合乳香一塊如龍眼大細碾隨瘡頭大小用竹片作圈子竹片濶二分許隨其大小頓在瘡頭上將所碾藥填平鋪艾灸之疼處以癢為度癢處以痛為度亦以百壯為凖一疽疾將安之際宜多服加料十全湯以補其氣血使易生肌肉也加料十全湯治癰疽後補氣血進飲食疽疾將安及七八分便當服此藥每日與排膿內托散相間服黃耆㨂不用義附及蛀者銼作二寸長截拍匾以冷鹽湯濕潤瓦器盛蓋甑上蒸三次焙銼用乾􅌻地黃㨂肥大滋潤者淨洗焙乾用好餅酒濕潤瓦器盛蓋於飯甑上蒸曬如此七次銼焙二各用一兩淨味當歸去蘆淨洗取自頭至中心一截銼焙乾用自中至尾留合别藥川芎銼微炒人參去頂挫焙白茯苓去黑皮銼焙甘草炙白芍藥㨂有皮者買無皮是偽者削去皮銼焙用肉桂削去粗皮銼不見火天台烏藥如無真者買隆興府大塊者用銼焙白术用米泔浸半日銼到小指頭大方塊焙乾再用麥麩炒至黃色不得傷火去麩將白木銼用陳皮不用沙將柑子皮浸削去白瓤炒銼真北五味子核如豬腎形肉微黑苦味重者是真㨂去枝杖炒過用核如沙柑子核者是土五味子不堪用已上十一味各半兩右各乾淨稱銼作散和勻每服藥一兩用水一碗生薑五片北棗二枚同煎至八分碗濾去滓取清汁分作兩服留滓曬乾碾羅為細末後來常服水一盞生薑三片棗一枚煎至八分服之一前後病背疽人多是先發渴而後發背疽不然背疽安而後發渴疾因此不救者甚多若有渴疾人則合專服加減八味丸能使渴疾既安疽疾不作若驟得背疽之疾既安之後不論有無渴證便合常服加減八味九非特可以杜渴疾之將來亦且大能增益氣血生長肌肉使精神強健此乃纍試獲驗加減八味丸治癰疽後合服補藥若用峻補之藥則發熱又况癰疽既安之後多傳作渴疾不可治療當預服此藥如能久服永不生渴疾氣血和壯未發疽人或先有渴證亦合服此藥渴疾既安疽亦不作乾熟地黃如法㨂好者買製度過焙銼二兩真山藥細銼微炒山茰肉去核取肉焙乾二味各一兩肉桂味辛辣薄者買削去粗皮銼不見火用一兩别研取半兩淨末和入衆藥餘粗滓仍勿用澤㵼水洗銼作塊無灰酒濕瓦器乘蓋甑上蒸五次銼焙牡丹皮去心枝杖銼炒白茯苓去黑皮銼焙已上三味各八錢北真五味子㨂去枝杖熳火炒至透不得傷火一兩半别研羅和入衆藥此一味最要真者其詳已著十全湯內右研羅為細末煉蜜候冷和丸如梧桐子大每服三十丸空心無灰酒或鹽湯送下論渴疾本原有一貴人病疽疾未安而渴作一日飲水數升愚遂獻此方諸醫失笑云此藥若能止渴我輩當不復業醫矣諸醫盡用木瓜紫蘇烏梅參苓百藥煎等生津液止渴之藥服多而愈渴甚數日之後茫無功效不得已而用此藥服之三日渴止因此相信遂久服之不特渴疾不作血氣益壯飲食加倍強健過於少壯之年蓋用此藥非愚敢自執鄙見實有源流自為童兒時聞先君言有一士大夫病渴疾諸醫遍用渴藥治療纍載不安有一名醫誨之使服加減八味丸不半載而疾痊因疏其病源云今醫多有醒脾生津止渴之藥誤矣其疾本起於腎水枯竭不能上潤是以心火上炎不能既濟煎熬而生渴今服八味丸降其心火生其腎水則渴自止矣復疏其藥性云內真北五味子最為得力此一味獨能生腎水平補降心火大有功效家藏此方親用有驗故敢詳著之使有渴疾者信其言專志服餌而取效無為庸醫所惑庶廣前人製方濟惠意癰口將收論一癰口將收之際最忌用急澀斂口之藥只宜用神異膏貼多見昧者立説破此一假不過病者厭於將理醫者急欲獲利不思毒氣發泄未盡其疾再來人命自此不救癰久瘡口不合論一治癰久而瘡口不合其肉白而膿血少此為瘡口冷滯乃病人氣血枯竭不潮於瘡故致如是合用北艾湯洗神異膏貼多服排膿內補散每日用好北艾葉一把入瓦器內濃煎湯避風處乘熱用艾湯澆洗瘡口四圍淨肉以舊絹帛兜艾葉乘熱沃澆一日一次洗了須避風仍燒松香以煙熏瘡口良久用神異膏貼之其瘡不可與厭穢之人見若不能禁忌瘡口難安藥亦無救一病癰疽之人適被庸醫用毒藥掩盫或以針刀傷割不能生肌肉瘡口不合切不可用急澀斂口藥當只用豬蹄湯北艾湯相間洗以神異膏貼之并服排膿內補散一前方但是居於州縣間有力者能及之若適在鄉原與夫無力以市藥者只可用鷺鷥藤酒一方終始服餌俟其疽破即以神異膏貼之然神異膏所用藥材皆非貴細難得之藥前後用此以醫田夫野老百發百中大川烏丸治發背活經絡生肌肉大川烏生去皮尖當歸赤芍藥蘇木銼炒沒藥生用一兩别研乳香一兩别研穿山甲用蚌粉炒脆去粉二兩獨活合用老羌活今鋪中所賣獨活乃土當歸不可用二兩右為細末和勻酒煮麵糊為丸梧桐子大溫酒下三十丸空心下二烏丸治發背托裏定痛驅風毒涼血脈羌活去苗薄荷葉三兩川芎以上各不見火地榆麻黃去節防風去蘆天麻白芷白殭蠶用直者去絲足口牛旁子炒蔓荆子去蒂并白膜旋覆花去萼荆芥穗各二兩甘菊花三兩何首烏四兩大川烏生四兩甘草炙四兩半蟬退去足半兩右為細末煉蜜丸如彈子大每服一丸細嚼茶清任下食後服退毒下膿漏蘆湯治疽作二日後與五香連翹湯相間服之黃耆生用連翹各一兩大黃一分微炒漏蘆一兩有白茸者甘草半兩生用沉香一兩右為末薑棗湯調下此二方連日相間服乃宣毒之藥覺毒盡住服參苓順氣散治病癰疽人進飲食健脾烏藥一兩半人參一分茯苓一分白者青皮去白半兩麩炒甘草半兩炙真紫蘇子二錢半微炒右為細末每服藥末二錢水一盞薑棗煎至八分早辰空心溫服煎藥不用紫蘇能發熱動氣當用老薑連皮使梔子黃芩湯治發背瘡潰後因飲食有傷調攝不到發熱不住用以退熱漏蘆連翹山梔子仁黃芩去心各二兩半黃耆生用一兩防風石韋合使桑白皮自取者甘草生犀角生用人參苦參白茯苓各二錢右以上為粗末每服四錢水一中盞煎至六分去滓溫服蚣蝎散治癰疽瘡口小而硬貼膏藥而膿不來此為風毒所勝赤足蜈蚣一條去頭足生用全蝎三箇去丁爪要有尾者生用木香一錢右為細末每用時先以豬蹄湯藥洗疽了以此藥一字許糝於膏藥錢上近瘡口處貼其效如神每用神異膏合先量疽大小塗在紙花上了却用此藥糝於膏藥上要使先到瘡故也若瘡口闊大及不硬則不必用此內托黃耆丸治因用針砭傷其經絡白膿赤汁逗流不止黃耆八兩生用當歸二兩洗焙肉桂去粗皮木香乳香别研沉香以上四味各一兩右為細末用菉豆粉四兩生薑自然汁煮糊丸如梧桐子大每服五十丸溫熱水下不拘時候沉麝湯治發背疽之人生肌斂口不得用躁急之藥只合用麥飯石膏塗續用好膏貼之瘡口自然斂合如醫治後時為庸醫用毒藥掩盫或刀割傷內血重者兼服此木香麝香沉香藿香葉連翹右等分為細末每二錢水一盞煎至七分溫服無時疽疾既已先服取毒之藥又用麥飯石膏塗貼五七日後病漸減退合服大川烏丸二烏丸驅除餘毒活氣血生肌肉排宿膿去風邪又合服洪氏內補散多服為妙立效散治發背及諸癰疽并瘰􅐇有效皂角刺半兩㨂去枯者細銼炒赤色為度須耐久炒甘草二兩合生用瓜􅌣五箇去皮取肉并仁搗研炒黃乾者不必炒乳香半兩别研和入沒藥一兩别研和入右五味為末每服二錢酒調下乳癰與前方間服神妙神妙忍冬丸療病既愈須預防發癰疽宜服忍冬草左纒藤是也不以多少根莖花葉皆可用右以酒於瓶內浸以粳火煨一宿取出曬乾入甘草少許為末以所浸酒為糊丸如梧桐子大每服五十丸至百丸酒飲任下不拘時治一切癤毒癰疽將結則散已聚則破已破痛不可忍者貼之則寬止痛神效不可具述案以下所製方皆不另立方名無鹽桃末皂角末白芷末荆芥末草烏頭末右等分用米醋調貼四圍留中蜜調亦得癰疽不可膏藥貼合論治些小癰癤結而未成不可用膏藥貼合以藥塗使內自消每用生取鹿角尖於砂盆內同老米醋今俗呼黃子醋濃磨時以鵝翎塗拂於癰癤四圍當中留一口遇乾再塗一二日即內消每覺有些小癰癤疼痛發熱時便用生甘草節不炙不焙用日曬乾若無日焙於籠蓋上微火碾為細末以熱酒調二三錢服連進數服疼痛與熱皆止治癰疽結未成并氣血凝滯腫結成塊者用吳茱茰微炒碾為細末雞子清調塗神妙疾輕者宜用此治乳癰發背神方金銀花一名忍寒草右採葉研為滓每用不限多少納瓷瓶中入水用文武火濃煎臨熟入好無灰酒與藥汁相半再煎十數沸濾滓時時服之留滓焙乾碾羅為細末酒煮麵糊為丸梧桐子大每服三十丸空心溫酒下丸藥俟疾稍退可以常服蓋其力輕甚故也預防癰疽方服此藥可以終身無此疾綿黃耆七兩㨂如箭桿樣性軟者用去蘆并乂附不用一半生使細挫焙乾一半銼作寸長截捶匾以蜜水浸潤濕瓦器盛蓋於飯甑上蒸三次取出焙乾銼碎粉草去節并去皮取一兩半淨將一半生細銼焙一半炙黃銼焙右二味碾為細末每服二錢早辰日午白點湯當湯水服夜候飲酒初杯用藥調服若平日能如此常服之終身不患癰疽之疾案以上各方不見於諸論中今總集之附於諸論之後括􅌣散治婦人乳疽妳勞神效今俗呼妳勞即此疾之漸括􅌣一箇去皮焙研為末急用只爛研子多者有力當歸淨洗去蘆焙細銼半兩甘草半兩細銼生用通眀沒藥一分别研乳香一錢别研右用無灰酒三升同於銀石器中慢火熬取一升清汁分作三服食後良久服如有妳勞便服此藥可杜絶病根如毒已成能化膿為黃水毒末成即於大小便中通泄疾甚再合服以退為妙婦人乳疽方雖多獨此一方神效無比萬不失一腦疽不可炙引其氣一上痰涎膿血併起上攻傾人性命急於反掌但當急灸三里穴并氣海漸漸服涼胸膈化血之藥人可小安此説載通神方論腦疽咽喉生疽古法皆不治之證此灸法引毒氣歸下其理頗長得此疾者豈可坐受其斃當信而用之案以上二方一治腦疽一治乳疽皆與背疽無涉以其為李氏之書故併附於此
