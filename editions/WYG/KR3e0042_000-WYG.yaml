body:
  text: 提要集驗背疽方一卷醫家類臣等謹案集騐背疽方一卷宋李迅撰迅字嗣立泉州人官大理評事以醫著名此書見於陳振孫書録解題稱所集凡五十三條其議論詳盡曲當馬端臨經籍考亦著於録而題作李逸撰與書録解題不合今案此書前有郭應祥序亦云嗣立名􅌺則通考誤也背疽為患至鉅俗醫剽竊一二丹方或妄施刀針而於受病之源發病之形及夫用藥次第節宣禁忌之所宜俱置不講故夭閼者十恒八九今􅌺所撰於集方之前俱系以論説凡診候之虛實治療之節度無不斟酌輕重辨析毫芒使讀者瞭如指掌中如五香連翹湯内補十宣散加料十全湯加减八味丸立效散之類皆醇粹無疵足稱良劑至忍冬丸與治乳癰發背神方皆祗金銀花一味用藥易而収功多於窮鄉僻壤難以覔醫或貧家無力服藥者尤為有益洵瘍科中之善本矣謹從永樂大典中採掇裒訂仍為一卷其麥飯石膏及神異膏二方乃諸方中最神妙者而永樂大典乃偶佚之今據蘇沈良方及危亦林得效方補入又赤水元珠亦載有神異膏方與得效方稍有不同今並列之以備參攷焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀李氏集騐方序始予奉親携㓜来官泉江未入境首問邑有良醫師乎又問市有佳藥肆乎或對以醫固不乏人而庸庸者實多藥肆僅一二數然稍貴細者則缺焉予謂二者老㓜所依以為命也今顧若此其奈之何哉或曰邑有李嗣立廷評者廣收方書多蓄藥味有問方者必告有求藥者必與了無吝色厭心予固私竊慶幸時方至旅見亦未暇詢及也久之嗣立来請間與之􅍁語見其持心近厚非愛人利物之言不談叩以難素脉訣病源等書其應荅如流厥後家人子或有病䟽方恵藥雖數數不憚煩凡三年間不醫之求而唯嗣立之謁一日嗣立出示一編曰此治背瘡方也今人例以此為惡疾悉付之外科而邈不加之意不知治療之失宜盖未有能得全其生者某於此究心有年所治甚衆君能捐二三萬錢刻板流布不猶愈於刋他書乎予且圖之㑹有黄冠師曰劉道淵者主邑之太霄觀忽得此疾劉素號曉方脉得嗣立之書而敬信之凡服藥次第悉按書以從事不兩月遂獲安子益信其書之有騐乃為之序其首嗣立名迅以儒𫝊家父兄相繼收科子弟亦登名賢書鄉評翕然推重予與其兄嗣宗嘗同校長沙試契分為不薄又有鍼膏起廢之功故樂為之成其志云郭應祥序
